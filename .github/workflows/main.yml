name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Prepare
        run: |
          pacman-key --init
          # The base image ships a single geo-CDN mirror; when a Fastly edge is
          # flaky pacman aborts the whole transaction ("too many errors ...
          # skipping"). Give it several independent mirrors plus retries so a
          # bad edge can't fail the build.
          cat > /etc/pacman.d/mirrorlist <<'MIRRORS'
          Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
          Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch
          Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
          MIRRORS
          pac() { for i in 1 2 3; do pacman "$@" && return 0; echo "pacman failed (attempt $i), retrying..."; sleep 10; done; return 1; }
          pac -Syu --noconfirm
          pac -S --noconfirm git meson clang glslang libcap wlroots0.18 \
            sdl2 vulkan-headers libx11 libxmu libxcomposite libxrender libxres \
            libxtst libxkbcommon libdrm libinput wayland-protocols benchmark \
            xorg-xwayland pipewire cmake \
            libavif libheif aom rav1e libdecor libxdamage \
            luajit
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build with gcc
        run: |
          export CC=gcc CXX=g++
          # -Dwlroots:werror=false: the vendored wlroots 0.18 subproject forces
          # its own werror=true and breaks under rolling-Arch's newer libinput
          # (unhandled LIBINPUT_SWITCH_KEYPAD_SLIDE enum). Keep --werror gating
          # gamescope's own src/, but don't hold vendored wlroots to it.
          meson build-gcc/ -Dinput_emulation=disabled --werror -Dwlroots:werror=false --auto-features=enabled
          ninja -C build-gcc/
      - name: Build with gcc (no vr)
        run: |
          export CC=gcc CXX=g++
          meson build-gcc-novr/ -Dinput_emulation=disabled -Denable_openvr_support=false --werror -Dwlroots:werror=false --auto-features=enabled
          ninja -C build-gcc-novr/
#      - name: Build with clang
